GLOBAL:
    LOG_LEVEL: 2                          # 日志级别：0=DEBUG,1=INFO,2=WARNING,3=ERROR
    GPU_INDICES:
    - 0                                   # 使用第1块GPU（如果有多个GPU可添加如 [0,1]）
    RANDOM_SEED: 1618033989                # 随机种子，确保实验可重复
    ANOMALY_DETECTION: false               # 是否开启异常检测（调试用）
    FILTER_WARNINGS: true                   # 是否过滤警告信息
    METHOD_TYPE: GaussianSplatting          # 方法类型：3D高斯溅射
    DATASET_TYPE: MipNeRF360                # 数据集类型：MipNeRF360格式

MODEL:
    SH_DEGREE: 3                           # 球谐函数阶数（0-3），控制颜色表示的精度，3阶效果最好但最耗显存

RENDERER:
    USE_FUSED_COVARIANCE_COMPUTATION: true  # 使用融合的协方差计算（加速）
    USE_FUSED_SH_CONVERSION: true            # 使用融合的球谐函数转换（加速）
    SCALE_MODIFIER: 1.0                      # 缩放修饰符，调整高斯点的大小
    DISABLE_SH0: false                       # 不禁用SH 0阶（基础颜色）
    DISABLE_SH1: false                       # 不禁用SH 1阶
    DISABLE_SH2: false                       # 不禁用SH 2阶
    DISABLE_SH3: false                       # 不禁用SH 3阶
    USE_BAKED_COVARIANCE: false               # 是否使用预计算的协方差

TRAINING:
    LOAD_CHECKPOINT: null                    # 加载预训练检查点（null表示从头训练）
    MODEL_NAME: 3dgs_garden                   # 模型保存名称
    NUM_ITERATIONS: 30_000                    # 总训练迭代次数（3万次）
    ACTIVATE_TIMING: false                     # 是否开启计时功能
    RUN_VALIDATION: false                      # 是否运行验证
    BACKUP:
        FINAL_CHECKPOINT: true                  # 是否保存最终检查点
        RENDER_TESTSET: true                     # 是否渲染测试集
        RENDER_TRAINSET: false                    # 是否渲染训练集
        RENDER_VALSET: false                      # 是否渲染验证集
        VISUALIZE_ERRORS: false                    # 是否可视化误差
        INTERVAL: -1                              # 备份间隔（-1表示不进行中间备份）
        TRAINING_STATE: false                      # 是否保存训练状态
    WANDB:
        ACTIVATE: false                           # 是否激活Weights & Biases可视化工具
        ENTITY: null                              # wandb实体名称
        PROJECT: nerficg                          # wandb项目名称
        LOG_IMAGES: true                          # 是否记录图像
        INDEX_VALIDATION: -1                       # 验证集索引（-1表示随机）
        INDEX_TRAINING: -1                         # 训练集索引（-1表示随机）
        INTERVAL: 1000                            # wandb记录间隔
        SWEEP_MODE:
            ACTIVE: false                          # 是否激活超参数搜索模式
            START_ITERATION: 999                    # 开始搜索的迭代次数
            ITERATION_STRIDE: 1000                  # 搜索步长
    GUI:
        ACTIVATE: true                            # 是否激活GUI界面
        RENDER_INTERVAL: 5                         # GUI渲染间隔（帧）
        GUI_STATUS_ENABLED: true                    # 是否启用GUI状态显示
        GUI_STATUS_INTERVAL: 20                     # GUI状态更新间隔
        SKIP_GUI_SETUP: false                       # 是否跳过GUI设置
        FPS_ROLLING_AVERAGE_SIZE: 100               # FPS滑动平均窗口大小
    LEARNING_RATE_POSITION_INIT: 0.00016          # 位置初始学习率
    LEARNING_RATE_POSITION_FINAL: 1.6e-06         # 位置最终学习率
    LEARNING_RATE_POSITION_DELAY_MULT: 0.01       # 位置学习率延迟乘数
    LEARNING_RATE_POSITION_MAX_STEPS: 30_000      # 位置学习率最大步数
    LEARNING_RATE_FEATURE: 0.0025                  # 特征学习率
    LEARNING_RATE_OPACITY: 0.05                    # 不透明度学习率
    LEARNING_RATE_SCALING: 0.005                   # 缩放学习率
    LEARNING_RATE_ROTATION: 0.001                   # 旋转学习率
    PERCENT_DENSE: 0.01                            # 密集化百分比
    OPACITY_RESET_INTERVAL: 3_000                   # 不透明度重置间隔
    DENSIFY_START_ITERATION: 500                    # 开始密集化的迭代次数
    DENSIFY_END_ITERATION: 15_000                    # 结束密集化的迭代次数
    DENSIFICATION_INTERVAL: 100                      # 密集化间隔
    DENSIFY_GRAD_THRESHOLD: 0.0002                   # 密集化梯度阈值
    LOSS:
        LAMBDA_L1: 0.8                              # L1损失权重
        LAMBDA_DSSIM: 0.2                            # DSSIM损失权重（结构相似性）

DATASET:
    PATH: dataset/mipnerf360/garden                # 数据集路径
    IMAGE_SCALE_FACTOR: 0.25                        # 图像缩放因子（原图的1/4）
    NORMALIZE_CUBE: null                            # 是否归一化到立方体（null表示不）
    NORMALIZE_RECENTER: false                        # 是否重新居中
    PRECOMPUTE_RAYS: false                           # 是否预计算光线
    TO_DEVICE: true                                  # 是否将数据移到GPU
    BACKGROUND_COLOR:
    - 0.0                                           # 背景色RGB：黑色
    - 0.0
    - 0.0
    NEAR_PLANE: 0.2                                 # 近平面距离
    FAR_PLANE: 100.0                                # 远平面距离
    TEST_STEP: 8                                    # 测试步长（每8张选1张做测试）
    APPLY_PCA: true                                 # 是否应用PCA降维
    APPLY_PCA_RESCALE: false                         # 是否PCA后重新缩放
    USE_PRECOMPUTED_DOWNSCALING: true                # 是否使用预计算的下采样